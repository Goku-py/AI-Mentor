<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Programming Mistake Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>AI Programming Mistake Analyzer</h1>
            <p class="subtitle">
                Paste your code, hit <strong>Analyze</strong>, and get instant feedback on potential issues.
            </p>
        </header>

        <main class="app-main">
            <section class="panel panel-input">
                <h2>Code Input</h2>
                <label for="code-input" class="field-label">Your code</label>
                <textarea id="code-input" class="code-input" rows="14" spellcheck="false"
                          placeholder="Paste your code here..."></textarea>

                <div class="controls">
                    <div class="control-group">
                        <label for="language-select" class="field-label">Language</label>
                        <select id="language-select" class="select">
                            <option value="python" selected>Python</option>
                            <option value="javascript">JavaScript (Node.js)</option>
                            <option value="java">Java (static only)</option>
                            <option value="c">C (static only)</option>
                            <option value="cpp">C++ (static only)</option>
                            <option value="html">HTML (static only)</option>
                        </select>
                    </div>
                    <button id="analyze-btn" class="primary-button" type="button">
                        Analyze Code
                    </button>
                </div>
            </section>

            <section class="panel panel-results">
                <h2>Analysis Results</h2>
                <div id="results" class="results">
                    <p class="results-placeholder">
                        No analysis yet. Paste some code and click <strong>Analyze Code</strong> to see results here.
                    </p>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
